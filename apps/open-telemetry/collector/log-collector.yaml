apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-log-collector
  namespace: flux-system
spec:
  chart:
    spec:
      chart: opentelemetry-collector
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
      version: "0.120.2"
  interval: 1h0m0s
  timeout: 15m
  releaseName: otel-log-collector
  targetNamespace: open-telemetry
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    mode: daemonset
    image:
      repository: "otel/opentelemetry-collector-k8s"
    presets:
      logsCollection:
        enabled: true
      kubernetesAttributes:
        enabled: true
    config:
      exporters:
        otlphttp:
          endpoint: 'http://parseable-ingestor-headless.parseable.svc.cluster.local:8000'
          headers:
            Authorization: 'Basic YWRtaW46YWRtaW4='
            X-P-Log-Source: otel-logs
            X-P-Stream: otel-logs
            Content-Type: application/json
          encoding: json
          tls:
            insecure: true
      service:
        pipelines:
          logs:
            exporters:
              - otlphttp