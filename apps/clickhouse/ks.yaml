---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: clickhouse
  namespace: flux-system
spec:
  interval: 15m0s
  url: oci://registry-1.docker.io/bitnamicharts/clickhouse
  ref:
    tag: 8.0.7
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clickhouse
  namespace: flux-system
spec:
  interval: 1h0m0s
  dependsOn:
    - name: kube-prometheus-stack
  path: ./apps/clickhouse/clickhouse
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 10m0s
  wait: true
  force: true
